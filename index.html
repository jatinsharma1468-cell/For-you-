<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: pink;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  font-family: Arial;
}

h1 {
  font-size: 6vw;
  padding: 20px;
  z-index: 2;
}

/* Button */
button {
  padding: 12px 25px;
  font-size: 18px;
  background: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  z-index: 2;
}

/* Hearts */
.heart {
  position: absolute;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>

</head>

<body>

<h1>
Hillo meri pidduu mera bacha meri cutuuuuuu nityaaaaaaa meri jaan meri burgir meri chalako nitya meri mumma meri wifey🫣🫣
</h1>

<button onclick="location.href='page2.html'">mwahh 😘</button>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 200);
</script>

</body>
</html>
