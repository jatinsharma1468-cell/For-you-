button {
  padding: 12px 25px;

  background: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  z-index: 2;
  margin-top: 20px;
}

/* Roses */
.rose {
  position: absolute;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}

<script>
function createRose() {
  const rose = document.createElement("div");
  rose.classList.add("rose");
  rose.innerHTML = "🌹";

  rose.style.left = Math.random() * 100 + "vw";
  rose.style.fontSize = (Math.random() * 20 + 15) + "px";

  document.body.appendChild(rose);

  setTimeout(() => {
    rose.remove();
  }, 6000);
}

setInterval(createRose, 300);
