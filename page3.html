<!DOCTYPE html>
<html>
<head>
<title>Sorry ❤️</title>

<style>
body {
  margin: 0;
  background: pink;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  font-family: Arial;
}

h1 {
  font-size: 5vw;
  padding: 20px;
  z-index: 2;
  line-height: 1.5;
}

/* Floating items */
.item {
  position: absolute;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>

</head>

<body>

<h1>
I am soo soooo sorryyyyyy 😭😭<br><br>
jis way mein maine aaj baat ki really sorryy for that…<br><br>
it's just ki jab mujhe lage ki tere ko bhi mere se problem ho rhi toh mujhe kuch hone lag parta 😭😭<br><br>
I lovee youuu yaarrrrr… mai nhi chahta ki tu mere se kabhi dur hoo pleaseeee 😭😭<br><br>
I lovee youuuuuuuuuu ♥️♥️
</h1>

<script>
function createItem() {
  const item = document.createElement("div");
  item.classList.add("item");

  // Randomly choose heart or rose
  item.innerHTML = Math.random() > 0.5 ? "❤️" : "🌹";

  item.style.left = Math.random() * 100 + "vw";
  item.style.fontSize = (Math.random() * 20 + 15) + "px";

  document.body.appendChild(item);

  setTimeout(() => {
    item.remove();
  }, 6000);
}

setInterval(createItem, 250);
</script>

</body>
</html>
